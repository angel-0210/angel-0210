<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 100" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
      
      .text-title {
        font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 32px;
        font-weight: 700;
        fill: #00D9FF;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      
      .cursor {
        fill: #00D9FF;
        animation: blink 0.8s infinite;
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>
  
  <!-- Text Element -->
  <text x="375" y="50" class="text-title">
    👋 Hey, I'm Angel Gupta
    <animate 
      attributeName="opacity" 
      values="1;0;0;1" 
      keyTimes="0;0.4;0.6;1" 
      dur="6s" 
      repeatCount="indefinite" />
  </text>
  
  <text x="375" y="50" class="text-title" fill="#8b5cf6">
    🤖 Android Architect
    <animate 
      attributeName="opacity" 
      values="0;1;0;0" 
      keyTimes="0;0.3;0.7;1" 
      dur="6s" 
      repeatCount="indefinite" />
  </text>

  <text x="375" y="50" class="text-title" fill="#f59e0b">
    🚀 Full-Stack Developer
    <animate 
      attributeName="opacity" 
      values="0;0;1;0" 
      keyTimes="0;0.6;0.9;1" 
      dur="6s" 
      repeatCount="indefinite" />
  </text>
</svg>
